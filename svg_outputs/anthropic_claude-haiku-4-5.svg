<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Bicycle -->
  <!-- Frame -->
  <line x1="100" y1="150" x2="200" y2="150" stroke="black" stroke-width="4"/>
  <line x1="200" y1="150" x2="250" y2="200" stroke="black" stroke-width="4"/>
  <line x1="100" y1="150" x2="150" y2="200" stroke="black" stroke-width="4"/>
  <line x1="150" y1="200" x2="250" y2="200" stroke="black" stroke-width="4"/>
  
  <!-- Wheels -->
  <circle cx="150" cy="200" r="30" fill="none" stroke="black" stroke-width="3"/>
  <circle cx="250" cy="200" r="30" fill="none" stroke="black" stroke-width="3"/>
  
  <!-- Handlebars -->
  <line x1="100" y1="150" x2="80" y2="120" stroke="black" stroke-width="3"/>
  <circle cx="80" cy="120" r="8" fill="black"/>
  
  <!-- Seat -->
  <ellipse cx="180" cy="130" rx="15" ry="8" fill="brown" stroke="black" stroke-width="2"/>
  
  <!-- Pedals -->
  <circle cx="175" cy="170" r="6" fill="gray" stroke="black" stroke-width="2"/>
  
  <!-- Pelican Body -->
  <ellipse cx="170" cy="110" rx="35" ry="30" fill="white" stroke="black" stroke-width="2"/>
  
  <!-- Pelican Head -->
  <circle cx="190" cy="85" r="20" fill="white" stroke="black" stroke-width="2"/>
  
  <!-- Pelican Bill (pouch) -->
  <ellipse cx="220" cy="90" rx="35" ry="12" fill="orange" stroke="black" stroke-width="2"/>
  <path d="M 255 90 Q 270 85 260 95" fill="orange" stroke="black" stroke-width="2"/>
  
  <!-- Eye -->
  <circle cx="200" cy="80" r="4" fill="black"/>
  
  <!-- Wing -->
  <path d="M 160 110 Q 140 100 135 120" fill="none" stroke="black" stroke-width="2"/>
  
  <!-- Feet on pedals -->
  <ellipse cx="175" cy="176" rx="6" ry="8" fill="orange"/>
  <ellipse cx="175" cy="164" rx="6" ry="8" fill="orange"/>
</svg>