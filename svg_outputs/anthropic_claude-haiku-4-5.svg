<svg viewBox="0 0 400 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="350" fill="#e8f4f8"/>
  
  <!-- Bicycle wheels -->
  <circle cx="120" cy="240" r="40" fill="none" stroke="#333" stroke-width="8"/>
  <circle cx="280" cy="240" r="40" fill="none" stroke="#333" stroke-width="8"/>
  
  <!-- Wheel spokes -->
  <g stroke="#999" stroke-width="1">
    <line x1="120" y1="200" x2="120" y2="280"/>
    <line x1="120" y1="240" x2="160" y2="240"/>
    <line x1="120" y1="240" x2="80" y2="240"/>
    <line x1="120" y1="240" x2="155" y2="175"/>
    <line x1="120" y1="240" x2="85" y2="305"/>
    
    <line x1="280" y1="200" x2="280" y2="280"/>
    <line x1="280" y1="240" x2="320" y2="240"/>
    <line x1="280" y1="240" x2="240" y2="240"/>
    <line x1="280" y1="240" x2="315" y2="175"/>
    <line x1="280" y1="240" x2="245" y2="305"/>
  </g>
  
  <!-- Bicycle frame -->
  <g stroke="#333" stroke-width="4" fill="none">
    <line x1="120" y1="240" x2="200" y2="160"/>
    <line x1="200" y1="160" x2="280" y2="240"/>
    <line x1="200" y1="160" x2="120" y2="240"/>
    <line x1="200" y1="160" x2="280" y2="240"/>
  </g>
  
  <!-- Handlebars -->
  <g stroke="#333" stroke-width="3" fill="none">
    <line x1="200" y1="160" x2="200" y2="130"/>
    <path d="M 170 130 Q 200 120 230 130" fill="none"/>
  </g>
  
  <!-- Pedals and crank -->
  <circle cx="200" cy="180" r="6" fill="#333"/>
  <g stroke="#333" stroke-width="3" fill="none">
    <line x1="200" y1="180" x2="200" y2="210"/>
  </g>
  
  <!-- Pelican body -->
  <ellipse cx="200" cy="130" rx="45" ry="40" fill="#f5f5f5" stroke="#333" stroke-width="2"/>
  
  <!-- Pelican head -->
  <circle cx="215" cy="95" r="28" fill="#f5f5f5" stroke="#333" stroke-width="2"/>
  
  <!-- Pelican eye -->
  <circle cx="225" cy="90" r="4" fill="#333"/>
  
  <!-- Pelican bill (large distinctive pouch) -->
  <path d="M 240 100 Q 280 105 285 115 Q 280 120 240 118 Z" fill="#d4a574" stroke="#333" stroke-width="2"/>
  <ellipse cx="262" cy="110" rx="20" ry="8" fill="#e8c9a0" stroke="#333" stroke-width="1"/>
  
  <!-- Pelican wing -->
  <path d="M 190 140 Q 160 120 155 160 Q 165 150 195 155 Z" fill="#d3d3d3" stroke="#333" stroke-width="2"/>
  
  <!-- Pelican legs (on pedals) -->
  <g stroke="#333" stroke-width="3" fill="none">
    <line x1="190" y1="170" x2="185" y2="210"/>
    <line x1="210" y1="170" x2="215" y2="210"/>
  </g>
  
  <!-- Pelican feet -->
  <ellipse cx="185" cy="215" rx="8" ry="6" fill="#d4a574" stroke="#333" stroke-width="1"/>
  <ellipse cx="215" cy="215" rx="8" ry="6" fill="#d4a574" stroke="#333" stroke-width="1"/>
  
  <!-- Happy vibe - pelican smile indicator -->
  <path d="M 230 100 Q 235 105 230 110" stroke="#333" stroke-width="1" fill="none"/>
  
  <!-- Ground -->
  <line x1="0" y1="280" x2="400" y2="280" stroke="#90c890" stroke-width="3"/>
  <ellipse cx="120" cy="282" rx="50" ry="8" fill="#90c890" opacity="0.5"/>
  <ellipse cx="280" cy="282" rx="50" ry="8" fill="#90c890" opacity="0.5"/>
</svg>