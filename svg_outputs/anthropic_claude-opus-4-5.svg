<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#87CEEB"/>
  
  <!-- Ground -->
  <rect x="0" y="250" width="400" height="50" fill="#90EE90"/>
  
  <!-- Bicycle back wheel -->
  <circle cx="100" cy="220" r="40" fill="none" stroke="#333" stroke-width="4"/>
  <circle cx="100" cy="220" r="5" fill="#333"/>
  
  <!-- Bicycle front wheel -->
  <circle cx="280" cy="220" r="40" fill="none" stroke="#333" stroke-width="4"/>
  <circle cx="280" cy="220" r="5" fill="#333"/>
  
  <!-- Bicycle frame -->
  <line x1="100" y1="220" x2="170" y2="160" stroke="#E63946" stroke-width="5"/>
  <line x1="170" y1="160" x2="170" y2="200" stroke="#E63946" stroke-width="5"/>
  <line x1="170" y1="200" x2="100" y2="220" stroke="#E63946" stroke-width="5"/>
  <line x1="170" y1="160" x2="250" y2="160" stroke="#E63946" stroke-width="5"/>
  <line x1="250" y1="160" x2="280" y2="220" stroke="#E63946" stroke-width="5"/>
  <line x1="170" y1="200" x2="250" y2="160" stroke="#E63946" stroke-width="5"/>
  
  <!-- Seat -->
  <ellipse cx="170" cy="155" rx="20" ry="6" fill="#333"/>
  
  <!-- Handlebars -->
  <line x1="250" y1="160" x2="250" y2="130" stroke="#333" stroke-width="4"/>
  <line x1="235" y1="130" x2="265" y2="130" stroke="#333" stroke-width="4"/>
  
  <!-- Pedals -->
  <circle cx="170" cy="200" r="12" fill="#333"/>
  <line x1="170" y1="200" x2="155" y2="215" stroke="#333" stroke-width="3"/>
  <line x1="170" y1="200" x2="185" y2="185" stroke="#333" stroke-width="3"/>
  <rect x="145" y="212" width="15" height="6" fill="#666"/>
  <rect x="182" y="180" width="15" height="6" fill="#666"/>
  
  <!-- Pelican body -->
  <ellipse cx="180" cy="120" rx="45" ry="35" fill="#F5F5F5"/>
  
  <!-- Pelican wing -->
  <ellipse cx="175" cy="115" rx="30" ry="20" fill="#E0E0E0"/>
  
  <!-- Pelican neck -->
  <path d="M210 100 Q240 80 235 50" stroke="#F5F5F5" stroke-width="20" fill="none"/>
  
  <!-- Pelican head -->
  <circle cx="235" cy="45" r="20" fill="#F5F5F5"/>
  
  <!-- Pelican eye -->
  <circle cx="242" cy="40" r="5" fill="#333"/>
  <circle cx="243" cy="39" r="2" fill="#FFF"/>
  
  <!-- Pelican beak top -->
  <path d="M250 45 L295 50 L250 55" fill="#F4A460"/>
  
  <!-- Pelican beak pouch -->
  <path d="M250 55 Q275 75 250 60 Q270 70 295 50" fill="#FFB347"/>
  
  <!-- Pelican legs -->
  <line x1="160" y1="145" x2="155" y2="210" stroke="#F4A460" stroke-width="4"/>
  <line x1="195" y1="145" x2="190" y2="180" stroke="#F4A460" stroke-width="4"/>
  
  <!-- Pelican feet on pedals -->
  <ellipse cx="152" cy="215" rx="8" ry="4" fill="#F4A460"/>
  <ellipse cx="190" cy="183" rx="8" ry="4" fill="#F4A460"/>
  
  <!-- Pelican tail -->
  <path d="M135 130 Q110 125 120 140" fill="#E0E0E0"/>
</svg>