<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Bicycle frame -->
  <g id="bicycle">
    <!-- Back wheel -->
    <circle cx="100" cy="220" r="35" fill="none" stroke="#333" stroke-width="3"/>
    <circle cx="100" cy="220" r="3" fill="#333"/>
    
    <!-- Front wheel -->
    <circle cx="260" cy="220" r="35" fill="none" stroke="#333" stroke-width="3"/>
    <circle cx="260" cy="220" r="3" fill="#333"/>
    
    <!-- Frame -->
    <line x1="100" y1="220" x2="160" y2="160" stroke="#e74c3c" stroke-width="4"/>
    <line x1="160" y1="160" x2="200" y2="200" stroke="#e74c3c" stroke-width="4"/>
    <line x1="200" y1="200" x2="260" y2="220" stroke="#e74c3c" stroke-width="4"/>
    <line x1="160" y1="160" x2="210" y2="160" stroke="#e74c3c" stroke-width="4"/>
    <line x1="210" y1="160" x2="260" y2="220" stroke="#e74c3c" stroke-width="4"/>
    <line x1="100" y1="220" x2="140" y2="200" stroke="#e74c3c" stroke-width="4"/>
    <line x1="140" y1="200" x2="160" y2="160" stroke="#e74c3c" stroke-width="4"/>
    
    <!-- Seat -->
    <ellipse cx="145" cy="195" rx="15" ry="6" fill="#333"/>
    
    <!-- Handlebars -->
    <line x1="210" y1="160" x2="235" y2="140" stroke="#333" stroke-width="3"/>
    <line x1="225" y1="140" x2="245" y2="140" stroke="#333" stroke-width="3"/>
  </g>
  
  <!-- Pelican -->
  <g id="pelican">
    <!-- Body -->
    <ellipse cx="160" cy="140" rx="40" ry="35" fill="#f0f0f0" stroke="#333" stroke-width="2"/>
    
    <!-- Wing -->
    <path d="M 140 130 Q 110 120 100 140 Q 110 150 130 145 Z" fill="#ddd" stroke="#333" stroke-width="2"/>
    
    <!-- Neck -->
    <ellipse cx="185" cy="115" rx="15" ry="25" fill="#f0f0f0" stroke="#333" stroke-width="2"/>
    
    <!-- Head -->
    <ellipse cx="200" cy="85" rx="18" ry="20" fill="#f0f0f0" stroke="#333" stroke-width="2"/>
    
    <!-- Eye -->
    <circle cx="205" cy="80" r="4" fill="#333"/>
    
    <!-- Upper beak -->
    <path d="M 210 85 Q 250 82 270 90 Q 250 88 210 92 Z" fill="#ffa500" stroke="#333" stroke-width="2"/>
    
    <!-- Lower beak with pouch -->
    <path d="M 210 92 Q 250 88 270 90 Q 265 105 250 110 Q 230 108 210 98 Z" fill="#ffb84d" stroke="#333" stroke-width="2"/>
    
    <!-- Legs to pedals -->
    <line x1="155" y1="170" x2="180" y2="200" stroke="#ffa500" stroke-width="3"/>
    <line x1="165" y1="170" x2="150" y2="205" stroke="#ffa500" stroke-width="3"/>
    
    <!-- Feet on pedals -->
    <ellipse cx="180" cy="205" rx="8" ry="5" fill="#ffa500" stroke="#333" stroke-width="1"/>
    <ellipse cx="150" cy="208" rx="8" ry="5" fill="#ffa500" stroke="#333" stroke-width="1"/>
    
    <!-- Wing holding handlebar -->
    <line x1="190" y1="125" x2="235" y2="140" stroke="#f0f0f0" stroke-width="6"/>
    <line x1="190" y1="125" x2="235" y2="140" stroke="#333" stroke-width="2" fill="none"/>
  </g>
</svg>