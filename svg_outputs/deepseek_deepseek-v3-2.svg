<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Bicycle Frame -->
  <circle cx="120" cy="200" r="30" fill="#ccc" stroke="#333" stroke-width="2"/>
  <circle cx="280" cy="200" r="30" fill="#ccc" stroke="#333" stroke-width="2"/>
  <line x1="120" y1="200" x2="240" y2="140" stroke="#333" stroke-width="4"/>
  <line x1="280" y1="200" x2="240" y2="140" stroke="#333" stroke-width="4"/>
  <line x1="240" y1="140" x2="280" y2="80" stroke="#333" stroke-width="4"/>
  <rect x="275" y="75" width="10" height="40" fill="#333"/>
  
  <!-- Pedals and Crank -->
  <circle cx="280" cy="200" r="10" fill="#666"/>
  <line x1="280" y1="200" x2="300" y2="180" stroke="#333" stroke-width="3"/>
  <circle cx="300" cy="180" r="6" fill="#555"/>
  
  <!-- Pelican Body -->
  <ellipse cx="220" cy="100" rx="50" ry="30" fill="#f8f8f8" stroke="#333" stroke-width="2"/>
  
  <!-- Pelican Head and Beak -->
  <circle cx="260" cy="90" r="20" fill="#f8f8f8" stroke="#333" stroke-width="2"/>
  <path d="M 260 90 L 310 80 L 300 110 Z" fill="#ffaa66" stroke="#333" stroke-width="2"/>
  <circle cx="265" cy="85" r="3" fill="#333"/>
  
  <!-- Wing (on side) -->
  <ellipse cx="200" cy="110" rx="30" ry="15" fill="#f8f8f8" stroke="#333" stroke-width="2" transform="rotate(-20 200 110)"/>
  
  <!-- Feet on Pedals -->
  <circle cx="300" cy="180" r="8" fill="#ffaa66"/>
  <circle cx="260" cy="210" r="8" fill="#ffaa66"/>
  
  <!-- Seat -->
  <rect x="230" y="125" width="20" height="8" fill="#333" rx="2"/>
  
  <!-- Simple ground line -->
  <line x1="50" y1="230" x2="350" y2="230" stroke="#777" stroke-width="2"/>
</svg>