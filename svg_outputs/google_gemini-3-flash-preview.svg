<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background (Optional) -->
  <rect width="400" height="400" fill="#f0f8ff" />

  <!-- Bicycle Wheels -->
  <circle cx="120" cy="320" r="45" fill="none" stroke="#333" stroke-width="6"/>
  <circle cx="120" cy="320" r="38" fill="none" stroke="#ccc" stroke-width="2"/>
  <circle cx="280" cy="320" r="45" fill="none" stroke="#333" stroke-width="6"/>
  <circle cx="280" cy="320" r="38" fill="none" stroke="#ccc" stroke-width="2"/>

  <!-- Bicycle Frame -->
  <path d="M120 320 L200 320 L260 220 L180 220 Z" fill="none" stroke="#2c3e50" stroke-width="8" stroke-linejoin="round"/>
  <line x1="280" y1="320" x2="250" y2="200" stroke="#2c3e50" stroke-width="8" />
  <line x1="250" y1="200" x2="220" y2="200" stroke="#2c3e50" stroke-width="8" /> <!-- Handlebars -->
  
  <!-- Seat Support -->
  <line x1="180" y1="220" x2="180" y2="250" stroke="#2c3e50" stroke-width="8" />

  <!-- Pelican Body -->
  <ellipse cx="185" cy="190" rx="45" ry="35" fill="white" stroke="#333" stroke-width="2" />
  
  <!-- Pelican Wing -->
  <path d="M160 190 Q185 160 210 190" fill="none" stroke="#ccc" stroke-width="3" />

  <!-- Pelican Neck and Head -->
  <path d="M220 170 Q240 170 240 130" fill="none" stroke="white" stroke-width="25" stroke-linecap="round" />
  <circle cx="240" cy="120" r="18" fill="white" stroke="#333" stroke-width="2" />
  
  <!-- Eye -->
  <circle cx="248" cy="115" r="3" fill="black" />

  <!-- The Large Pelican Beak -->
  <path d="M255 115 L330 130 Q330 160 255 145 Z" fill="#ffb82e" stroke="#e67e22" stroke-width="2" />
  
  <!-- Legs on Pedals -->
  <path d="M185 225 L200 280 L220 280" fill="none" stroke="#333" stroke-width="4" stroke-linecap="round" />
  <circle cx="200" cy="285" r="5" fill="#333" /> <!-- Pedal -->

  <!-- Ground Line -->
  <line x1="50" y1="365" x2="350" y2="365" stroke="#95a5a6" stroke-width="2" stroke-dasharray="10, 5" />
</svg>