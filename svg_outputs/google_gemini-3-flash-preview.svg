<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Bicycle Wheels -->
  <circle cx="60" cy="160" r="25" fill="none" stroke="#333" stroke-width="3"/>
  <circle cx="60" cy="160" r="2" fill="#333"/>
  <circle cx="140" cy="160" r="25" fill="none" stroke="#333" stroke-width="3"/>
  <circle cx="140" cy="160" r="2" fill="#333"/>
  
  <!-- Bicycle Frame -->
  <path d="M60 160 L100 160 L130 110 L85 110 Z" fill="none" stroke="#2c3e50" stroke-width="4" stroke-linejoin="round"/>
  <line x1="130" y1="110" x2="140" y2="160" stroke="#2c3e50" stroke-width="4"/>
  <line x1="85" y1="110" x2="85" y2="100" stroke="#2c3e50" stroke-width="4"/>
  
  <!-- Handlebars -->
  <path d="M125 110 L120 90 L135 85" fill="none" stroke="#2c3e50" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Pelican Body -->
  <ellipse cx="85" cy="115" rx="22" ry="30" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
  
  <!-- Pelican Wing -->
  <path d="M85 100 Q110 105 120 90" fill="none" stroke="#ccc" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Pelican Head -->
  <circle cx="95" cy="70" r="15" fill="#f0f0f0" />
  <circle cx="102" cy="65" r="2" fill="black"/> <!-- Eye -->
  
  <!-- The Iconic Beak -->
  <path d="M105 70 C145 70 155 100 110 105 C100 105 95 90 95 80" fill="#FFB84D" stroke="#E67E22" stroke-width="1"/>
  <line x1="105" y1="75" x2="145" y2="75" stroke="#E67E22" stroke-width="1" opacity="0.5"/>
  
  <!-- Pelican Legs/Feet -->
  <path d="M80 145 L75 160 H85" fill="none" stroke="#E67E22" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Ground Line -->
  <line x1="20" y1="185" x2="180" y2="185" stroke="#eee" stroke-width="2" stroke-linecap="round"/>
</svg>