<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle (optional) -->
  <circle cx="200" cy="200" r="190" fill="#e0f7fa" />

  <!-- Road -->
  <rect x="50" y="320" width="300" height="10" rx="5" fill="#90a4ae" />

  <!-- Bicycle -->
  <g transform="translate(0, 10)">
    <!-- Back Wheel -->
    <circle cx="120" cy="280" r="40" fill="none" stroke="#37474f" stroke-width="8" />
    <circle cx="120" cy="280" r="35" fill="none" stroke="#fff" stroke-width="2" />
    <circle cx="120" cy="280" r="5" fill="#37474f" />
    <!-- Spokes Back -->
    <line x1="120" y1="240" x2="120" y2="320" stroke="#b0bec5" stroke-width="2" />
    <line x1="80" y1="280" x2="160" y2="280" stroke="#b0bec5" stroke-width="2" />

    <!-- Front Wheel -->
    <circle cx="280" cy="280" r="40" fill="none" stroke="#37474f" stroke-width="8" />
    <circle cx="280" cy="280" r="35" fill="none" stroke="#fff" stroke-width="2" />
    <circle cx="280" cy="280" r="5" fill="#37474f" />
    <!-- Spokes Front -->
    <line x1="280" y1="240" x2="280" y2="320" stroke="#b0bec5" stroke-width="2" />
    <line x1="240" y1="280" x2="320" y2="280" stroke="#b0bec5" stroke-width="2" />

    <!-- Bike Frame -->
    <path d="M120 280 L180 200 L260 200 L280 280" fill="none" stroke="#d84315" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M120 280 L190 280 L230 200" fill="none" stroke="#d84315" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Seat -->
    <path d="M160 190 L200 190" stroke="#37474f" stroke-width="8" stroke-linecap="round" />
    <rect x="175" y="190" width="10" height="20" fill="#37474f" />

    <!-- Handlebars -->
    <path d="M255 180 L260 200" stroke="#37474f" stroke-width="6" stroke-linecap="round" />
    <path d="M255 180 Q270 180 275 190" fill="none" stroke="#37474f" stroke-width="6" stroke-linecap="round" />
    
    <!-- Pedals/Gear -->
    <circle cx="190" cy="280" r="10" fill="#546e7a" />
    <path d="M190 280 L200 300 L215 300" fill="none" stroke="#546e7a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- The Pelican -->
  <g transform="translate(0, 10)">
    <!-- Leg -->
    <path d="M180 210 L190 250 L200 300" fill="none" stroke="#ffcc80" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Body -->
    <ellipse cx="170" cy="160" rx="45" ry="55" fill="#fff" transform="rotate(-10 170 160)" />
    
    <!-- Wing -->
    <path d="M160 140 Q120 160 140 200 Q180 190 190 150" fill="#eceff1" stroke="#cfd8dc" stroke-width="2" />
    
    <!-- Tail -->
    <path d="M130 170 L110 180 L125 190 Z" fill="#fff" />

    <!-- Neck -->
    <path d="M185 130 Q200 100 200 80" fill="none" stroke="#fff" stroke-width="25" stroke-linecap="round" />

    <!-- Head -->
    <circle cx="205" cy="75" r="22" fill="#fff" />
    
    <!-- Eye -->
    <circle cx="210" cy="70" r="3" fill="#000" />

    <!-- Beak Top -->
    <path d="M225 65 Q260 65 290 85 L220 85 Z" fill="#ffb74d" />
    
    <!-- Beak Pouch (Bottom) -->
    <path d="M220 85 Q260 120 285 85 Z" fill="#ffab91" stroke="#ff8a65" stroke-width="1" />
    
    <!-- Hat (Optional Safety Gear) -->
    <path d="M190 60 Q205 35 220 60" fill="#ef5350" />
    <rect x="190" y="60" width="30" height="5" fill="#d32f2f" />
    
    <!-- Wing/Arm reaching for handlebars -->
    <path d="M190 150 Q230 150 255 180" fill="none" stroke="#fff" stroke-width="12" stroke-linecap="round" />
    
    <!-- Feathers detail -->
    <path d="M195 230 Q185 240 195 250" fill="none" stroke="#b0bec5" stroke-width="2" />
  </g>
</svg>