<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Bicycle -->
  <g id="bicycle">
    <!-- Frame -->
    <path d="M100 200 L200 200 L150 100 Z" fill="none" stroke="#333" stroke-width="3"/>
    <line x1="200" y1="200" x2="250" y2="200" stroke="#333" stroke-width="3"/>
    <line x1="250" y1="200" x2="200" y2="100" stroke="#333" stroke-width="3"/>
    
    <!-- Wheels -->
    <circle cx="100" cy="200" r="40" fill="none" stroke="#333" stroke-width="4"/>
    <circle cx="250" cy="200" r="40" fill="none" stroke="#333" stroke-width="4"/>
    
    <!-- Handlebars -->
    <line x1="200" y1="100" x2="200" y2="60" stroke="#333" stroke-width="3"/>
    <line x1="180" y1="60" x2="220" y2="60" stroke="#333" stroke-width="3"/>
    
    <!-- Seat -->
    <rect x="140" y="90" width="20" height="10" rx="5" fill="#8B4513"/>
  </g>
  
  <!-- Pelican -->
  <g id="pelican">
    <!-- Body -->
    <ellipse cx="160" cy="120" rx="30" ry="20" fill="#FFD700"/>
    
    <!-- Head -->
    <circle cx="160" cy="80" r="15" fill="#FFD700"/>
    
    <!-- Beak -->
    <path d="M175 80 Q190 70 200 80 Q190 90 175 80" fill="#FFA500"/>
    
    <!-- Eye -->
    <circle cx="155" cy="75" r="3" fill="#000"/>
    
    <!-- Wings -->
    <path d="M140 120 Q120 100 130 80 Q140 90 140 120" fill="#FFD700" opacity="0.8"/>
    <path d="M180 120 Q200 100 190 80 Q180 90 180 120" fill="#FFD700" opacity="0.8"/>
    
    <!-- Legs -->
    <line x1="150" y1="140" x2="150" y2="170" stroke="#FFA500" stroke-width="3"/>
    <line x1="170" y1="140" x2="170" y2="170" stroke="#FFA500" stroke-width="3"/>
    
    <!-- Feet on pedals -->
    <circle cx="150" cy="170" r="5" fill="#FFA500"/>
    <circle cx="170" cy="170" r="5" fill="#FFA500"/>
  </g>
</svg>