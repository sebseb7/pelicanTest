<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
  <!-- Background Ground (Optional) -->
  <line x1="50" y1="370" x2="450" y2="370" stroke="#e0e0e0" stroke-width="4" stroke-linecap="round"/>

  <!-- BICYCLE -->
  <!-- Rear Wheel -->
  <g transform="translate(150, 320)">
    <circle r="50" fill="none" stroke="#333" stroke-width="8"/>
    <circle r="45" fill="none" stroke="#ddd" stroke-width="2"/>
    <g stroke="#bbb" stroke-width="2">
      <line x1="0" y1="-45" x2="0" y2="45"/>
      <line x1="-45" y1="0" x2="45" y2="0"/>
    </g>
  </g>

  <!-- Front Wheel -->
  <g transform="translate(350, 320)">
    <circle r="50" fill="none" stroke="#333" stroke-width="8"/>
    <circle r="45" fill="none" stroke="#ddd" stroke-width="2"/>
    <g stroke="#bbb" stroke-width="2">
      <line x1="0" y1="-45" x2="0" y2="45"/>
      <line x1="-45" y1="0" x2="45" y2="0"/>
    </g>
  </g>

  <!-- Frame -->
  <path d="M150 320 L240 320 L190 220 L150 320" fill="none" stroke="#D32F2F" stroke-width="6" stroke-linejoin="round"/>
  <path d="M240 320 L320 220 L350 320" fill="none" stroke="#D32F2F" stroke-width="6" stroke-linejoin="round"/>
  <path d="M190 220 L320 220" fill="none" stroke="#D32F2F" stroke-width="6" stroke-linejoin="round"/>

  <!-- Seat -->
  <path d="M170 220 L210 220" stroke="black" stroke-width="10" stroke-linecap="round"/>

  <!-- Handlebars -->
  <path d="M320 220 Q320 170 350 180" fill="none" stroke="#555" stroke-width="6" stroke-linecap="round"/>

  <!-- Crank -->
  <circle cx="240" cy="320" r="8" fill="#888"/>
  <line x1="240" y1="320" x2="240" y2="290" stroke="#555" stroke-width="6" stroke-linecap="round"/> <!-- Far Pedal Arm -->
  <line x1="240" y1="320" x2="200" y2="320" stroke="#555" stroke-width="6" stroke-linecap="round"/> <!-- Near Pedal Arm (Pedaling forward) -->

  <!-- PELICAN -->
  
  <!-- Far Leg (Back, pedaling up) -->
  <line x1="215" y1="230" x2="240" y2="290" stroke="#FFA000" stroke-width="8" stroke-linecap="round" />

  <!-- Tail -->
  <path d="M160 230 L130 220 L160 210 Z" fill="white" stroke="black" stroke-width="2" stroke-linejoin="round"/>

  <!-- Body -->
  <ellipse cx="210" cy="230" rx="50" ry="40" fill="white" stroke="black" stroke-width="2"/>
  
  <!-- Neck -->
  <path d="M230 210 Q240 160 250 140" stroke="white" stroke-width="24" fill="none" stroke-linecap="round"/>

  <!-- Head -->
  <circle cx="250" cy="140" r="28" fill="white" stroke="black" stroke-width="2"/>

  <!-- Beak -->
  <!-- Complex shape for the characteristic pouch -->
  <path d="M275 130 L360 130 Q370 130 370 150 Q340 200 275 160 Z" fill="#FFA000" stroke="black" stroke-width="2"/>
  <path d="M275 145 L360 145" stroke="#E65100" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Eye -->
  <circle cx="255" cy="135" r="4" fill="black"/>
  <circle cx="257" cy="133" r="1.5" fill="white"/>

  <!-- Wing (Arm reaching for handle) -->
  <path d="M210 230 Q260 230 330 190" stroke="white" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- Wing Outline -->
  <path d="M210 230 Q260 230 330 190" stroke="black" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.2"/> 

  <!-- Near Leg (Front, pedaling down/forward) -->
  <line x1="215" y1="230" x2="200" y2="310" stroke="#FFA000" stroke-width="8" stroke-linecap="round" />

</svg>