<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky Background (Optional, helps visibility) -->
  <rect width="100%" height="100%" fill="#f0f8ff" />

  <!-- Back Wheel -->
  <g transform="translate(150, 300)">
    <circle r="50" stroke="#333" stroke-width="6" fill="none" />
    <circle r="45" stroke="#ddd" stroke-width="2" fill="none" />
    <!-- Spokes -->
    <path d="M0,-50 L0,50 M-50,0 L50,0 M-35,-35 L35,35 M-35,35 L35,-35" stroke="#ddd" stroke-width="2" />
    <circle r="5" fill="#333" />
  </g>

  <!-- Front Wheel -->
  <g transform="translate(450, 300)">
    <circle r="50" stroke="#333" stroke-width="6" fill="none" />
    <circle r="45" stroke="#ddd" stroke-width="2" fill="none" />
    <!-- Spokes -->
    <path d="M0,-50 L0,50 M-50,0 L50,0 M-35,-35 L35,35 M-35,35 L35,-35" stroke="#ddd" stroke-width="2" />
    <circle r="5" fill="#333" />
  </g>

  <!-- Bicycle Frame -->
  <path d="M150,300 L270,300 L210,220 L390,190 L270,300" stroke="#e74c3c" stroke-width="8" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  <line x1="210" y1="220" x2="390" y2="190" stroke="#e74c3c" stroke-width="6" /> <!-- Fork -->
  <line x1="150" y1="300" x2="210" y2="220" stroke="#e74c3c" stroke-width="6" /> <!-- Seat stay -->
  
  <!-- Handlebars -->
  <path d="M390,190 Q400,160 430,160" stroke="#555" stroke-width="6" fill="none" />
  <circle cx="430" cy="160" r="5" fill="#333" /> <!-- Handle grip -->

  <!-- Seat -->
  <path d="M190,220 L230,215" stroke="#333" stroke-width="6" stroke-linecap="round" />
  <ellipse cx="210" cy="210" rx="25" ry="8" fill="#333" transform="rotate(-10 210 210)" />

  <!-- Crank and Pedals -->
  <circle cx="270" cy="300" r="8" fill="#555" />
  <path d="M270,300 L290,315" stroke="#555" stroke-width="4" /> <!-- Pedal arm 1 -->
  <rect x="285" y="312" width="12" height="6" fill="#333" rx="2" /> <!-- Pedal 1 -->
  
  <!-- Pelican Body Group -->
  <g transform="translate(220, 180)">
    
    <!-- Legs -->
    <path d="M10,50 Q20,80 40,100" stroke="#95a5a6" stroke-width="6" fill="none" />
    <path d="M40,50 Q30,80 10,105" stroke="#95a5a6" stroke-width="6" fill="none" />

    <!-- Wing (Back) -->
    <path d="M20,40 Q-10,20 10,10 Q40,20 50,50" fill="white" stroke="#bdc3c7" stroke-width="2" />

    <!-- Body -->
    <ellipse cx="30" cy="40" rx="35" ry="25" fill="white" stroke="#bdc3c7" stroke-width="2" />

    <!-- Neck -->
    <path d="M50,30 Q70,10 80,20" fill="white" stroke="#bdc3c7" stroke-width="15" stroke-linecap="round" />
    
    <!-- Head -->
    <circle cx="85" cy="15" r="18" fill="white" stroke="#bdc3c7" stroke-width="2" />

    <!-- Beak (The defining feature) -->
    <path d="M95,10 L140,5 L140,20 L120,35 Q100,30 100,15" fill="#ff9f43" stroke="#e67e22" stroke-width="1" />
    <!-- Beak Pouch Detail -->
    <path d="M100,15 Q110,35 120,35" fill="none" stroke="#e67e22" stroke-width="1" opacity="0.6"/>

    <!-- Eye -->
    <circle cx="90" cy="10" r="3" fill="black" />
    <circle cx="91" cy="9" r="1" fill="white" />
    
    <!-- Wing (Front, flapping for balance) -->
    <path d="M30,40 Q70,10 90,30 Q70,50 30,40" fill="white" stroke="#bdc3c7" stroke-width="2" />
  </g>

</svg>