<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="#87CEEB"/>
  
  <!-- Ground -->
  <rect x="0" y="320" width="600" height="80" fill="#90EE90"/>
  
  <!-- Back Wheel -->
  <circle cx="160" cy="300" r="50" fill="none" stroke="#333" stroke-width="4"/>
  <circle cx="160" cy="300" r="45" fill="none" stroke="#666" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Front Wheel -->
  <circle cx="400" cy="300" r="50" fill="none" stroke="#333" stroke-width="4"/>
  <circle cx="400" cy="300" r="45" fill="none" stroke="#666" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Bike Frame -->
  <path d="M 160 300 L 280 300 L 240 200 Z" fill="none" stroke="#FF6347" stroke-width="5"/>
  <line x1="240" y1="200" x2="380" y2="300" stroke="#FF6347" stroke-width="5"/>
  <line x1="400" y1="300" x2="380" y2="220" stroke="#FF6347" stroke-width="5"/>
  
  <!-- Seat -->
  <path d="M 220 200 Q 240 195 260 200" fill="none" stroke="#333" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Handlebars -->
  <path d="M 380 220 L 380 180 Q 380 160 360 160" fill="none" stroke="#C0C0C0" stroke-width="4"/>
  <line x1="360" y1="160" x2="340" y2="165" stroke="#C0C0C0" stroke-width="3"/>
  
  <!-- Pedals -->
  <circle cx="280" cy="300" r="8" fill="#444"/>
  <line x1="280" y1="300" x2="290" y2="330" stroke="#666" stroke-width="3"/>
  <rect x="285" y="325" width="12" height="8" fill="#333" rx="2"/>
  
  <!-- Pelican Body -->
  <ellipse cx="260" cy="170" rx="40" ry="50" fill="white" stroke="#ddd" stroke-width="2"/>
  
  <!-- Neck -->
  <path d="M 290 150 Q 310 140 320 120" fill="none" stroke="white" stroke-width="25" stroke-linecap="round"/>
  
  <!-- Head -->
  <circle cx="325" cy="115" r="20" fill="white" stroke="#ddd" stroke-width="2"/>
  
  <!-- Beak (Upper) -->
  <path d="M 340 110 Q 380 105 400 120 Q 380 135 340 125" fill="#FFA500" stroke="#FF8C00" stroke-width="2"/>
  <!-- Beak (Lower pouch) -->
  <path d="M 340 125 Q 380 145 400 120" fill="#FFD700" stroke="#FF8C00" stroke-width="2" opacity="0.8"/>
  
  <!-- Eye -->
  <circle cx="330" cy="110" r="4" fill="black"/>
  <circle cx="331" cy="109" r="1.5" fill="white"/>
  
  <!-- Wing (holding handlebar) -->
  <path d="M 280 160 Q 310 165 340 175" fill="none" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <path d="M 280 160 Q 310 165 340 175" fill="none" stroke="#f0f0f0" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Wing (back) -->
  <path d="M 240 160 Q 220 180 230 210" fill="none" stroke="white" stroke-width="10" stroke-linecap="round"/>
  
  <!-- Leg -->
  <path d="M 260 210 L 270 300" fill="none" stroke="#FFA500" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Foot on pedal -->
  <ellipse cx="290" cy="330" rx="12" ry="6" fill="#FFA500"/>
  <line x1="298" y1="328" x2="305" y2="325" stroke="#FFA500" stroke-width="2"/>
  <line x1="298" y1="330" x2="305" y2="330" stroke="#FFA500" stroke-width="2"/>
  <line x1="298" y1="332" x2="305" y2="335" stroke="#FFA500" stroke-width="2"/>
  
  <!-- Sun -->
  <circle cx="500" cy="80" r="40" fill="#FFD700" opacity="0.9"/>
  <circle cx="500" cy="80" r="35" fill="#FFE44D"/>
  
  <!-- Cloud -->
  <path d="M 80 70 Q 95 50 110 70 Q 125 50 140 70 Q 155 70 160 80 Q 160 100 130 100 L 100 100 Q 70 100 80 70" fill="white" opacity="0.9"/>
</svg>