<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#87CEEB"/>
  <rect x="0" y="480" width="800" height="120" fill="#7CB342"/>
  <rect x="0" y="480" width="800" height="15" fill="#558B2F"/>
  
  <!-- Cloud -->
  <g fill="#FFF" opacity="0.9">
    <circle cx="200" cy="100" r="25"/>
    <circle cx="230" cy="90" r="35"/>
    <circle cx="260" cy="100" r="25"/>
    <rect x="200" y="100" width="60" height="25" rx="12"/>
  </g>
  
  <!-- Back Wheel -->
  <g transform="translate(250,480)">
    <circle r="70" fill="none" stroke="#222" stroke-width="8"/>
    <circle r="60" fill="none" stroke="#666" stroke-width="2"/>
    <g stroke="#888" stroke-width="2">
      <line x1="0" y1="-60" x2="0" y2="60"/>
      <line x1="-60" y1="0" x2="60" y2="0"/>
      <line x1="-42" y1="-42" x2="42" y2="42"/>
      <line x1="42" y1="-42" x2="-42" y2="42"/>
    </g>
    <circle r="8" fill="#333"/>
  </g>
  
  <!-- Front Wheel -->
  <g transform="translate(550,480)">
    <circle r="70" fill="none" stroke="#222" stroke-width="8"/>
    <circle r="60" fill="none" stroke="#666" stroke-width="2"/>
    <g stroke="#888" stroke-width="2">
      <line x1="0" y1="-60" x2="0" y2="60"/>
      <line x1="-60" y1="0" x2="60" y2="0"/>
      <line x1="-42" y1="-42" x2="42" y2="42"/>
      <line x1="42" y1="-42" x2="-42" y2="42"/>
    </g>
    <circle r="8" fill="#333"/>
  </g>
  
  <!-- Bicycle Frame -->
  <path d="M 250 480 L 320 360 L 480 330 L 550 480" fill="none" stroke="#D32F2F" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 320 360 L 300 330" fill="none" stroke="#D32F2F" stroke-width="8" stroke-linecap="round"/>
  <path d="M 320 360 L 380 480" fill="none" stroke="#D32F2F" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Seat -->
  <path d="M 285 330 Q 300 320 315 330" fill="none" stroke="#333" stroke-width="10" stroke-linecap="round"/>
  
  <!-- Handlebars -->
  <path d="M 470 330 Q 490 310 510 320" fill="none" stroke="#333" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Crank & Pedals -->
  <circle cx="380" cy="480" r="20" fill="none" stroke="#555" stroke-width="4"/>
  <line x1="380" y1="480" x2="360" y2="510" stroke="#333" stroke-width="5" stroke-linecap="round"/>
  <line x1="380" y1="480" x2="400" y2="450" stroke="#333" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Pelican -->
  <!-- Tail -->
  <path d="M 260 340 L 245 355 L 265 360 Z" fill="#FFF" stroke="#333" stroke-width="2"/>
  
  <!-- Body -->
  <ellipse cx="310" cy="340" rx="50" ry="38" fill="#FFF" stroke="#333" stroke-width="3"/>
  
  <!-- Neck -->
  <path d="M 345 325 Q 380 300 395 260" fill="none" stroke="#FFF" stroke-width="28" stroke-linecap="round"/>
  <path d="M 345 325 Q 380 300 395 260" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Head -->
  <ellipse cx="400" cy="255" rx="20" ry="18" fill="#FFF" stroke="#333" stroke-width="3"/>
  
  <!-- Beak Upper -->
  <path d="M 415 250 Q 470 250 490 275 Q 460 285 430 265" fill="#FF8C00" stroke="#333" stroke-width="2"/>
  <!-- Beak Lower / Pouch -->
  <path d="M 420 262 Q 450 275 475 278 Q 450 295 425 270" fill="#FFA500" stroke="#333" stroke-width="2"/>
  
  <!-- Eye -->
  <circle cx="408" cy="248" r="4" fill="#000"/>
  <circle cx="409" cy="247" r="1.5" fill="#FFF"/>
  
  <!-- Wing -->
  <path d="M 310 340 Q 275 350 285 375 Q 315 365 325 345" fill="#E8E8E8" stroke="#333" stroke-width="2"/>
  
  <!-- Legs -->
  <path d="M 295 370 L 305 430 L 360 510" fill="none" stroke="#FF8C00" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 315 370 L 335 420 L 400 450" fill="none" stroke="#FF8C00" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Feet -->
  <ellipse cx="360" cy="510" rx="13" ry="6" fill="#FF8C00" stroke="#333" stroke-width="2" transform="rotate(-15 360 510)"/>
  <ellipse cx="400" cy="450" rx="13" ry="6" fill="#FF8C00" stroke="#333" stroke-width="2" transform="rotate(15 400 450)"/>
  
  <!-- Arm/Wing to handlebar -->
  <path d="M 330 335 Q 410 330 510 320" fill="none" stroke="#FFF" stroke-width="9" stroke-linecap="round"/>
  <path d="M 330 335 Q 410 330 510 320" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Little Cap -->
  <path d="M 385 242 L 410 242 L 405 235 L 390 235 Z" fill="#D32F2F" stroke="#333" stroke-width="2"/>
</svg>