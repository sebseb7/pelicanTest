<svg viewBox="0 0 320 230" xmlns="http://www.w3.org/2000/svg">
  <!-- Wheels -->
  <circle cx="75" cy="180" r="35" fill="#fff" stroke="#222" stroke-width="5"/>
  <circle cx="205" cy="180" r="35" fill="#fff" stroke="#222" stroke-width="5"/>

  <!-- Frame -->
  <line x1="75" y1="180" x2="140" y2="120" stroke="#4e79a7" stroke-width="8"/>
  <line x1="205" y1="180" x2="140" y2="120" stroke="#4e79a7" stroke-width="8"/>
  <line x1="75" y1="180" x2="205" y2="180" stroke="#4e79a7" stroke-width="6"/>
  <line x1="140" y1="120" x2="160" y2="50" stroke="#4e79a7" stroke-width="5"/>

  <!-- Handlebar -->
  <line x1="160" y1="50" x2="210" y2="65" stroke="#444" stroke-width="4"/>
  <circle cx="210" cy="65" r="6" fill="#ccc" stroke="#444" stroke-width="2"/>

  <!-- Pelican Body -->
  <ellipse cx="135" cy="80" rx="35" ry="22" fill="#fff" stroke="#222" stroke-width="2"/>
  <!-- Pelican Head -->
  <ellipse cx="115" cy="56" rx="18" ry="15" fill="#fff" stroke="#222" stroke-width="2"/>
  <!-- Eye -->
  <circle cx="107" cy="55" r="2.5" fill="#000"/>
  <!-- Beak -->
  <polygon points="95,58 77,62 110,62" fill="#ffd700" stroke="#222" stroke-width="2"/>
  <polygon points="75,62 110,65 80,70" fill="#ffd700" opacity="0.7"/>
  <!-- Wing -->
  <ellipse cx="150" cy="85" rx="15" ry="9" fill="#d5e1e6" stroke="#222" stroke-width="1.5"/>

  <!-- Pelican Legs -->
  <rect x="145" y="125" width="5" height="35" rx="2" fill="#ffd700" stroke="#222" stroke-width="1"/>
  <rect x="125" y="135" width="5" height="30" rx="2" fill="#ffd700" stroke="#222" stroke-width="1"/>
  <!-- Feet -->
  <ellipse cx="147" cy="158" rx="7" ry="3" fill="#ffd700" stroke="#222" stroke-width="1"/>
  <ellipse cx="127" cy="163" rx="7" ry="3" fill="#ffd700" stroke="#222" stroke-width="1"/>
</svg>