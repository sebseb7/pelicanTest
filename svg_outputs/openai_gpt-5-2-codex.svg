<svg xmlns="http://www.w3.org/2000/svg" width="512" height="320" viewBox="0 0 512 320">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <!-- Wheels -->
  <circle cx="140" cy="240" r="50" fill="none" stroke="#333" stroke-width="6"/>
  <circle cx="360" cy="240" r="50" fill="none" stroke="#333" stroke-width="6"/>
  <!-- Frame -->
  <line x1="140" y1="240" x2="230" y2="190" stroke="#333" stroke-width="6"/>
  <line x1="230" y1="190" x2="320" y2="240" stroke="#333" stroke-width="6"/>
  <line x1="230" y1="190" x2="250" y2="240" stroke="#333" stroke-width="6"/>
  <line x1="250" y1="240" x2="140" y2="240" stroke="#333" stroke-width="6"/>
  <!-- Handlebar -->
  <line x1="320" y1="240" x2="350" y2="190" stroke="#333" stroke-width="6"/>
  <line x1="350" y1="190" x2="380" y2="190" stroke="#333" stroke-width="6"/>
  <!-- Seat -->
  <line x1="230" y1="190" x2="200" y2="170" stroke="#333" stroke-width="6"/>
  <line x1="190" y1="170" x2="215" y2="165" stroke="#333" stroke-width="6"/>
  <!-- Pelican body -->
  <ellipse cx="230" cy="135" rx="50" ry="35" fill="#f0f0f0" stroke="#333" stroke-width="4"/>
  <circle cx="260" cy="105" r="22" fill="#f0f0f0" stroke="#333" stroke-width="4"/>
  <!-- Beak -->
  <path d="M278 105 Q330 110 350 125 Q315 135 275 125 Z" fill="#ffcc66" stroke="#333" stroke-width="3"/>
  <circle cx="265" cy="100" r="3" fill="#333"/>
  <!-- Wing -->
  <path d="M210 135 Q230 155 260 150 Q240 130 215 125 Z" fill="#e0e0e0" stroke="#333" stroke-width="3"/>
  <!-- Pelican legs to pedals -->
  <line x1="220" y1="165" x2="235" y2="210" stroke="#333" stroke-width="4"/>
  <line x1="245" y1="165" x2="255" y2="210" stroke="#333" stroke-width="4"/>
  <!-- Pedals -->
  <line x1="245" y1="240" x2="265" y2="225" stroke="#333" stroke-width="4"/>
  <line x1="245" y1="240" x2="225" y2="255" stroke="#333" stroke-width="4"/>
</svg>