<svg xmlns="http://www.w3.org/2000/svg" width="500" height="300" viewBox="0 0 500 300">
  <rect width="100%" height="100%" fill="#f7fbff"/>

  <!-- Bicycle -->
  <circle cx="120" cy="210" r="45" fill="none" stroke="#333" stroke-width="4"/>
  <circle cx="360" cy="210" r="45" fill="none" stroke="#333" stroke-width="4"/>
  <circle cx="120" cy="210" r="6" fill="#333"/>
  <circle cx="360" cy="210" r="6" fill="#333"/>

  <line x1="120" y1="210" x2="240" y2="140" stroke="#2b6cb0" stroke-width="6"/>
  <line x1="240" y1="140" x2="360" y2="210" stroke="#2b6cb0" stroke-width="6"/>
  <line x1="120" y1="210" x2="300" y2="210" stroke="#2b6cb0" stroke-width="6"/>
  <line x1="240" y1="140" x2="250" y2="210" stroke="#2b6cb0" stroke-width="6"/>

  <!-- Seat -->
  <line x1="240" y1="140" x2="240" y2="110" stroke="#2b6cb0" stroke-width="6"/>
  <line x1="225" y1="110" x2="255" y2="110" stroke="#333" stroke-width="6" stroke-linecap="round"/>

  <!-- Handlebar -->
  <line x1="360" y1="210" x2="395" y2="150" stroke="#2b6cb0" stroke-width="6"/>
  <line x1="380" y1="145" x2="420" y2="135" stroke="#333" stroke-width="6" stroke-linecap="round"/>

  <!-- Pedals -->
  <circle cx="250" cy="210" r="8" fill="#333"/>
  <line x1="250" y1="210" x2="235" y2="195" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <line x1="250" y1="210" x2="265" y2="225" stroke="#333" stroke-width="4" stroke-linecap="round"/>

  <!-- Pelican -->
  <ellipse cx="265" cy="100" rx="70" ry="40" fill="#f5f7fa" stroke="#9aa5b1" stroke-width="2"/>
  <circle cx="190" cy="65" r="22" fill="#f5f7fa" stroke="#9aa5b1" stroke-width="2"/>
  <path d="M210 75 Q220 95 235 105" fill="none" stroke="#9aa5b1" stroke-width="6" stroke-linecap="round"/>

  <!-- Beak -->
  <polygon points="180,60 90,50 180,80" fill="#f6c244" stroke="#d9991e" stroke-width="2"/>
  <path d="M170 65 Q120 80 100 90" fill="none" stroke="#f6c244" stroke-width="8" stroke-linecap="round"/>

  <!-- Eye -->
  <circle cx="185" cy="60" r="3" fill="#333"/>

  <!-- Wing -->
  <path d="M265 100 Q300 115 320 90 Q305 125 260 130 Z" fill="#e1e7ef" stroke="#9aa5b1" stroke-width="2"/>

  <!-- Legs -->
  <line x1="270" y1="130" x2="250" y2="180" stroke="#9aa5b1" stroke-width="6" stroke-linecap="round"/>
  <line x1="245" y1="180" x2="250" y2="210" stroke="#9aa5b1" stroke-width="6" stroke-linecap="round"/>
  <line x1="290" y1="130" x2="265" y2="180" stroke="#9aa5b1" stroke-width="6" stroke-linecap="round"/>
  <line x1="265" y1="180" x2="235" y2="195" stroke="#9aa5b1" stroke-width="6" stroke-linecap="round"/>
</svg>