<svg xmlns="http://www.w3.org/2000/svg" width="900" height="450" viewBox="0 0 900 450">
  <defs>
    <style>
      .line { fill: none; stroke: #1b1b1b; stroke-width: 10; stroke-linecap: round; stroke-linejoin: round; }
      .thin { fill: none; stroke: #1b1b1b; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
      .white { fill: #ffffff; stroke: #1b1b1b; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- ground -->
  <path class="thin" d="M40 360 H860" opacity="0.25"/>

  <!-- bicycle wheels -->
  <circle class="line" cx="240" cy="330" r="85"/>
  <circle class="line" cx="660" cy="330" r="85"/>
  <circle class="thin" cx="240" cy="330" r="10"/>
  <circle class="thin" cx="660" cy="330" r="10"/>

  <!-- spokes -->
  <g class="thin" opacity="0.65">
    <!-- left -->
    <path d="M240 245 V415"/>
    <path d="M155 330 H325"/>
    <path d="M185 275 L295 385"/>
    <path d="M295 275 L185 385"/>
    <!-- right -->
    <path d="M660 245 V415"/>
    <path d="M575 330 H745"/>
    <path d="M605 275 L715 385"/>
    <path d="M715 275 L605 385"/>
  </g>

  <!-- frame -->
  <g class="line">
    <!-- main triangle -->
    <path d="M240 330 L420 330 L520 250 L360 250 Z"/>
    <!-- rear stay -->
    <path d="M360 250 L240 330"/>
    <!-- fork -->
    <path d="M520 250 L660 330"/>
    <!-- top tube extension to handlebars -->
    <path d="M520 250 L580 210"/>
    <!-- seat tube -->
    <path d="M360 250 L360 200"/>
  </g>

  <!-- seat & handlebars -->
  <g class="line">
    <path d="M330 200 H390"/>
    <path d="M565 210 L610 185"/>
    <path d="M605 185 H640"/>
  </g>

  <!-- crank -->
  <g class="line">
    <circle cx="420" cy="330" r="18"/>
    <path d="M420 330 L455 305"/>
    <path d="M420 330 L392 365"/>
  </g>

  <!-- pelican -->
  <!-- body -->
  <ellipse class="white" cx="420" cy="205" rx="120" ry="85"/>
  <!-- wing -->
  <path class="white" d="M360 215 C320 210, 300 240, 318 270 C350 320, 430 305, 468 262 C492 236, 442 222, 410 220" />
  <!-- neck -->
  <path class="white" d="M485 170 C540 120, 585 120, 610 150 C630 175, 600 205, 565 205 C535 205, 515 195, 500 185"/>
  <!-- head -->
  <circle class="white" cx="630" cy="155" r="48"/>
  <!-- eye -->
  <circle cx="645" cy="150" r="7" fill="#1b1b1b"/>
  <circle cx="647" cy="148" r="2.5" fill="#ffffff"/>

  <!-- beak -->
  <path class="white" d="M650 170 C700 175, 780 190, 820 205 C780 232, 700 235, 650 225 Z"/>
  <!-- pouch line -->
  <path class="thin" d="M650 225 C705 240, 770 240, 820 205"/>

  <!-- pelican legs to pedals -->
  <g class="line">
    <!-- left leg -->
    <path d="M400 275 C390 300, 388 320, 392 365"/>
    <path d="M392 365 L372 385"/>
    <!-- right leg -->
    <path d="M448 275 C462 295, 470 305, 455 305"/>
    <path d="M455 305 L475 285"/>
  </g>

  <!-- little scarf (optional flair) -->
  <path class="thin" d="M592 185 C565 205, 530 210, 500 198" opacity="0.85"/>

</svg>