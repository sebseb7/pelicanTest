<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="Pelican riding a bicycle">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#e8f6ff"/>
  <!-- Ground shadow -->
  <ellipse cx="370" cy="455" rx="330" ry="18" fill="#d7e7ef" opacity="0.5"/>

  <!-- Wheels (behind everything) -->
  <g stroke="#222" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="220" cy="360" r="80" fill="#111" opacity="0.05"/>
    <circle cx="220" cy="360" r="80"/>
    <circle cx="520" cy="360" r="80" fill="#111" opacity="0.05"/>
    <circle cx="520" cy="360" r="80"/>
    <!-- spokes -->
    <g stroke="#888" stroke-width="2" opacity="0.9">
      <g transform="translate(220,360)">
        <line x1="0" y1="0" x2="0" y2="-80"/>
        <line x1="0" y1="0" x2="68" y2="-40"/>
        <line x1="0" y1="0" x2="68" y2="40"/>
        <line x1="0" y1="0" x2="0" y2="80"/>
        <line x1="0" y1="0" x2="-68" y2="40"/>
        <line x1="0" y1="0" x2="-68" y2="-40"/>
      </g>
      <g transform="translate(520,360)">
        <line x1="0" y1="0" x2="0" y2="-80"/>
        <line x1="0" y1="0" x2="68" y2="-40"/>
        <line x1="0" y1="0" x2="68" y2="40"/>
        <line x1="0" y1="0" x2="0" y2="80"/>
        <line x1="0" y1="0" x2="-68" y2="40"/>
        <line x1="0" y1="0" x2="-68" y2="-40"/>
      </g>
    </g>
  </g>

  <!-- Bicycle frame -->
  <g stroke="#2b6cb0" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- top tube -->
    <path d="M320 260 L 460 250" />
    <!-- seat tube -->
    <path d="M320 260 L 360 360" />
    <!-- down tube -->
    <path d="M460 250 L 360 360" />
    <!-- chainstay -->
    <path d="M360 360 L 220 360" />
    <!-- seatstay -->
    <path d="M220 360 L 320 260" />
    <!-- fork -->
    <path d="M460 250 L 520 360" />
  </g>

  <!-- Chainring / crank / pedals -->
  <g stroke="#333" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="#444">
    <!-- chainring -->
    <circle cx="360" cy="360" r="12" fill="#444"/>
    <!-- pedal arms -->
    <line x1="360" y1="360" x2="325" y2="380" stroke="#333" stroke-width="6"/>
    <line x1="360" y1="360" x2="395" y2="340" stroke="#333" stroke-width="6"/>
  </g>

  <!-- Pedals -->
  <g fill="#222" stroke="#111" stroke-width="2">
    <rect x="316" y="374" width="20" height="8" rx="3" transform="rotate(-20 326 378)"/>
    <rect x="392" y="332" width="22" height="8" rx="3" transform="rotate(-20 403 336)"/>
  </g>

  <!-- Chain (dashed) -->
  <path d="M372 360 Q 420 340 460 340 M460 340 L 490 340"
        stroke="#6b6b6b" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="6 6"/>

  <!-- Seat -->
  <g>
    <rect x="304" y="248" width="40" height="10" rx="4" fill="#222" />
    <rect x="318" y="258" width="6" height="18" rx="2" fill="#2b6cb0" />
  </g>

  <!-- Handlebars -->
  <g stroke="#2b6cb0" stroke-width="9" stroke-linecap="round" fill="none">
    <path d="M468 245 q18 -12 40 5" />
    <path d="M468 245 q8 -10 18 -14" />
    <circle cx="506" cy="236" r="6" fill="#222"/>
  </g>

  <!-- Pelican -->
  <g transform="translate(0,0)">
    <!-- Body -->
    <ellipse cx="320" cy="200" rx="110" ry="70" transform="rotate(-6 320 200)"
             fill="#fff" stroke="#333" stroke-width="3"/>
    <!-- Wing -->
    <path d="M 265 200 q 45 -40 110 -25 q -20 20 -60 38 q -40 12 -50 12 z"
          fill="#78bfe6" stroke="#2f93c6" stroke-width="2" opacity="0.95"/>
    <!-- Neck -->
    <path d="M 365 185 C 372 170 390 165 410 170" fill="none" stroke="#f6f0e8" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 365 185 C 372 170 390 165 410 170" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    <!-- Head -->
    <circle cx="410" cy="170" r="26" fill="#fff" stroke="#333" stroke-width="3"/>
    <!-- Beak upper -->
    <path d="M 430 165 Q 495 150 532 170 Q 500 162 435 170 Z"
          fill="#ffb14b" stroke="#b86a0f" stroke-width="3"/>
    <!-- Beak lower -->
    <path d="M 435 175 Q 495 190 528 182 Q 492 192 430 178 Z"
          fill="#ffd79a" stroke="#b86a0f" stroke-width="2"/>
    <!-- Eye -->
    <circle cx="398" cy="162" r="6" fill="#111"/>
    <circle cx="402" cy="158" r="2" fill="#fff"/>

    <!-- Legs -->
    <g stroke="#ff9a3b" stroke-width="10" stroke-linecap="round" fill="none">
      <!-- right leg to front (right) pedal -->
      <path d="M 360 255 C 370 295 385 330 395 340" />
      <!-- left leg to rear (left) pedal -->
      <path d="M 325 255 C 335 295 335 340 325 380" />
    </g>

    <!-- Feet (on pedals) -->
    <g fill="#ff9a3b" stroke="#b86a0f" stroke-width="2">
      <ellipse cx="395" cy="340" rx="12" ry="6" transform="rotate(-20 395 340)"/>
      <ellipse cx="325" cy="380" rx="12" ry="6" transform="rotate(-10 325 380)"/>
    </g>
  </g>

  <!-- Finishing touches: a small cloud and sun -->
  <g fill="#fff" opacity="0.9">
    <ellipse cx="100" cy="80" rx="40" ry="20"/>
    <ellipse cx="130" cy="80" rx="30" ry="18"/>
    <ellipse cx="85" cy="70" rx="20" ry="12"/>
  </g>
  <circle cx="700" cy="70" r="28" fill="#ffd166" opacity="0.9"/>
</svg>