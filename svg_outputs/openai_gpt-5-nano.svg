<svg width="600" height="360" viewBox="0 0 600 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pelican riding a bicycle">
  <defs>
    <style>
      .frame{fill:none; stroke:#333; stroke-width:5; stroke-linecap:round; stroke-linejoin:round}
      .wheels{fill:none; stroke:#333; stroke-width:6}
      .pelican-body{fill:#fff; stroke:#333; stroke-width:2}
      .beak{fill:#f4a300; stroke:#333; stroke-width:2}
    </style>
  </defs>

  <!-- Wheels -->
  <circle class="wheels" cx="120" cy="260" r="60"/>
  <circle class="wheels" cx="360" cy="260" r="60"/>

  <!-- Frame -->
  <g class="frame">
    <line x1="150" y1="190" x2="190" y2="260" />
    <line x1="150" y1="190" x2="320" y2="170" />
    <line x1="190" y1="260" x2="320" y2="170" />
    <line x1="190" y1="260" x2="120" y2="260" />
    <line x1="150" y1="190" x2="120" y2="260" />
    <line x1="320" y1="170" x2="360" y2="260" />
    <line x1="320" y1="170" x2="340" y2="150" />
    <line x1="340" y1="150" x2="360" y2="160" />
  </g>

  <!-- Pelican perched on seat (left of center) -->
  <g>
    <!-- Body -->
    <ellipse class="pelican-body" cx="140" cy="190" rx="28" ry="20" fill="#ffffff" stroke="#333" stroke-width="2"/>
    <!-- Neck and head -->
    <path d="M130,180 C110,170 102,184 98,190" fill="none" stroke="#333" stroke-width="3" />
    <circle cx="118" cy="172" r="10" fill="#ffffff" stroke="#333" stroke-width="2"/>
    <circle cx="112" cy="170" r="3" fill="#000"/>
    <!-- Beak -->
    <polygon points="90,176 118,182 90,196" class="beak"/>
    <!-- Wing -->
    <path d="M112 188 C 132 190, 144 198, 132 206 C 122 208, 108 202, 112 188" fill="#ffffff" stroke="#333" stroke-width="2" />
  </g>
</svg>