<svg
    xmlns="http://www.w3.org/2000/svg"
    width="250"
    height="200"
    viewBox="0 0 250 200"
    style="background:#f0f8ff">

  <!-- ==================== Bicycle ==================== -->
  <!-- Wheels -->
  <circle cx="70"  cy="150" r="30" stroke="black" stroke-width="3" fill="none"/>
  <circle cx="190" cy="150" r="30" stroke="black" stroke-width="3" fill="none"/>

  <!-- Frame -->
  <line x1="70"  y1="150" x2="130" y2="90" stroke="black" stroke-width="3"/>
  <line x1="190" y1="150" x2="130" y2="90" stroke="black" stroke-width="3"/>
  <line x1="130" y1="90" x2="105" y2="70" stroke="black" stroke-width="3"/> <!-- fork -->

  <!-- Handlebars -->
  <line x1="95"  y1="70" x2="115" y2="70" stroke="black" stroke-width="3"/>
  <line x1="105" y1="70" x2="105" y2="60" stroke="black" stroke-width="3"/>

  <!-- Seat -->
  <line x1="120" y1="90" x2="140" y2="90" stroke="black" stroke-width="3"/>

  <!-- Pedal Crank -->
  <circle cx="115" cy="150" r="10" stroke="black" stroke-width="3" fill="none"/>
  <line x1="115" y1="150" x2="100" y2="140" stroke="black" stroke-width="2"/>
  <line x1="115" y1="150" x2="130" y2="140" stroke="black" stroke-width="2"/>

  <!-- ==================== Pelican ==================== -->
  <!-- Body -->
  <ellipse cx="135" cy="70" rx="20" ry="30"
           fill="#ffffff" stroke="black" stroke-width="2"/>

  <!-- Wing (simple curved shape) -->
  <path d="M120,70 Q135,55 150,70"
        fill="#ffffff" stroke="black" stroke-width="2"/>

  <!-- Head -->
  <circle cx="155" cy="45" r="12"
          fill="#ffffff" stroke="black" stroke-width="2"/>

  <!-- Eye -->
  <circle cx="158" cy="42" r="2" fill="black"/>

  <!-- Beak -->
  <polygon points="167,45 185,50 185,40"
           fill="#ffd700" stroke="black" stroke-width="1"/>

  <!-- Pelican “foot” on the pedal (just decorative) -->
  <line x1="115" y1="150" x2="110" y2="125"
        stroke="#ffcc99" stroke-width="2"/>
  <line x1="125" y1="150" x2="120" y2="125"
        stroke="#ffcc99" stroke-width="2"/>

</svg>