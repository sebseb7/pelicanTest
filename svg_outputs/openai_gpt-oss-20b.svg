<svg
    width="250"
    height="250"
    viewBox="0 0 250 250"
    xmlns="http://www.w3.org/2000/svg">
  <!-- Bicycle -->
  <circle cx="80" cy="150" r="30" fill="#666" stroke="#333" stroke-width="3"/>
  <circle cx="170" cy="150" r="30" fill="#666" stroke="#333" stroke-width="3"/>
  <path d="M110 140 L140 140 L140 130 L110 130 Z"
        fill="#999" stroke="#333" stroke-width="2"/>
  <path d="M82 144 L175 144"
        stroke="#333" stroke-width="4" stroke-linecap="round"/>

  <!-- Pelican -->
  <!-- Body -->
  <ellipse cx="140" cy="115" rx="25" ry="35" fill="#fff" stroke="#777" stroke-width="2"/>
  <!-- Head -->
  <circle cx="140" cy="75" r="15" fill="#fff" stroke="#777" stroke-width="2"/>
  <!-- Beak -->
  <polygon points="140,75 158,80 140,85" fill="#ffd700" stroke="#777" stroke-width="1"/>
  <!-- Eye -->
  <circle cx="138" cy="70" r="2" fill="#000"/>
  <!-- Wing -->
  <path d="M115,120 Q125,95 140,120" fill="none" stroke="#777" stroke-width="2"/>
  <!-- Tail -->
  <path d="M115,155 L140,140 L115,140 Z" fill="#fff" stroke="#777" stroke-width="1"/>
  <!-- Feet -->
  <line x1="145" y1="150" x2="145" y2="165" stroke="#777" stroke-width="3"/>
  <line x1="155" y1="150" x2="155" y2="165" stroke="#777" stroke-width="3"/>
</svg>