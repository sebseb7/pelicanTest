<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Bicycle Frame -->
  <path d="M 40 120 Q 60 80 60 50" stroke="#333" stroke-width="4" fill="none"/>
  <path d="M 60 50 Q 70 30 90 30" stroke="#333" stroke-width="4" fill="none"/>
  <path d="M 90 30 Q 110 50 110 70" stroke="#333" stroke-width="4" fill="none"/>
  <path d="M 110 70 Q 110 90 90 110" stroke="#333" stroke-width="4" fill="none"/>
  <path d="M 90 30 Q 90 70 110 70" stroke="#333" stroke-width="4" fill="none"/>
  
  <!-- Wheels -->
  <circle cx="60" cy="70" r="15" stroke="#333" stroke-width="3" fill="white"/>
  <circle cx="90" cy="30" r="15" stroke="#333" stroke-width="3" fill="white"/>
  <circle cx="60" cy="70" r="8" fill="#333"/>
  <circle cx="90" cy="30" r="8" fill="#333"/>
  <line x1="45" y1="70" x2="75" y2="70" stroke="#333" stroke-width="2"/>
  <line x1="75" y1="30" x2="105" y2="30" stroke="#333" stroke-width="2"/>
  
  <!-- Pelican Body -->
  <path d="M 110 70 Q 140 70 140 100 Q 140 130 110 130 Q 80 130 80 100 Q 80 70 110 70" fill="#FFFACD"/>
  
  <!-- Pelican Head -->
  <circle cx="135" cy="85" r="20" fill="#FFFACD"/>
  
  <!-- Pelican Beak -->
  <path d="M 150 85 Q 170 80 190 85 Q 170 90 150 85" fill="#FFA500"/>
  
  <!-- Pelican Eye -->
  <circle cx="142" cy="82" r="4" fill="#000"/>
  
  <!-- Pelican Wing -->
  <path d="M 120 90 Q 130 100 120 110 Q 115 105 120 90" fill="#F5F5DC"/>
  
  <!-- Bicycle Seat -->
  <path d="M 90 25 Q 90 10 110 15 Q 115 20 105 25 Z" fill="#8B4513"/>
  
  <!-- Pelican sitting on seat -->
  <path d="M 100 35 Q 105 40 110 35" stroke="#333" stroke-width="2" fill="none"/>
</svg>