<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f5f0e8" />
  
  <!-- Ground -->
  <ellipse cx="200" cy="350" rx="180" ry="15" fill="#c9d6a7" />
  
  <!-- Bicycle frame -->
  <path d="M 130 280 Q 150 240 170 280 Q 190 320 210 280 Q 230 240 250 280" stroke="#5a5a5a" stroke-width="3" fill="none" stroke-linecap="round" />
  
  <!-- Back wheel -->
  <circle cx="120" cy="300" r="45" fill="none" stroke="#3a3a3a" stroke-width="6" />
  <circle cx="120" cy="300" r="40" fill="none" stroke="#5a5a5a" stroke-width="2" />
  <line x1="120" y1="255" x2="120" y2="345" stroke="#5a5a5a" stroke-width="2" />
  <line x1="75" y1="300" x2="165" y2="300" stroke="#5a5a5a" stroke-width="2" />
  <line x1="90" y1="275" x2="150" y2="325" stroke="#5a5a5a" stroke-width="2" />
  <line x1="150" y1="275" x2="90" y2="325" stroke="#5a5a5a" stroke-width="2" />
  
  <!-- Front wheel -->
  <circle cx="250" cy="300" r="45" fill="none" stroke="#3a3a3a" stroke-width="6" />
  <circle cx="250" cy="300" r="40" fill="none" stroke="#5a5a5a" stroke-width="2" />
  <line x1="250" y1="255" x2="250" y2="345" stroke="#5a5a5a" stroke-width="2" />
  <line x1="205" y1="300" x2="295" y2="300" stroke="#5a5a5a" stroke-width="2" />
  <line x1="220" y1="275" x2="280" y2="325" stroke="#5a5a5a" stroke-width="2" />
  <line x1="280" y1="275" x2="220" y2="325" stroke="#5a5a5a" stroke-width="2" />
  
  <!-- Bicycle seat -->
  <rect x="165" y="255" width="20" height="8" rx="4" fill="#4a4a4a" />
  
  <!-- Handlebar -->
  <path d="M 260 240 Q 280 220 300 240" stroke="#4a4a4a" stroke-width="4" fill="none" stroke-linecap="round" />
  
  <!-- Pedal (left side) -->
  <ellipse cx="180" cy="320" rx="8" ry="4" fill="#4a4a4a" />
  
  <!-- Pelican body -->
  <ellipse cx="180" cy="220" rx="35" ry="25" fill="#f5f5f5" />
  
  <!-- Pelican wing -->
  <path d="M 165 200 Q 150 180 170 165 Q 200 175 195 205" fill="#e0e0e0" />
  
  <!-- Pelican tail -->
  <path d="M 165 230 Q 145 220 155 210" stroke="#e0e0e0" stroke-width="8" fill="none" stroke-linecap="round" />
  
  <!-- Pelican neck -->
  <path d="M 210 210 Q 230 190 240 170" stroke="#f5f5f5" stroke-width="12" fill="none" stroke-linecap="round" />
  
  <!-- Pelican head -->
  <circle cx="245" cy="160" r="15" fill="#f5f5f5" />
  
  <!-- Pelican eye -->
  <circle cx="248" cy="155" r="3" fill="#333" />
  <circle cx="249" cy="154" r="1" fill="#fff" />
  
  <!-- Pelican beak -->
  <path d="M 260 160 L 290 165 L 285 175 Z" fill="#ff9933" />
  <path d="M 260 160 L 280 155 L 285 175 Z" fill="#ffb366" />
  
  <!-- Pelican beak pouch -->
  <path d="M 260 165 Q 270 185 285 175" fill="#ffcc99" />
  
  <!-- Pelican leg (on pedal) -->
  <path d="M 185 245 Q 175 280 175 315" stroke="#ff9933" stroke-width="4" fill="none" stroke-linecap="round" />
  <path d="M 170 315 L 180 325 L 185 320 L 178 318" fill="#ff9933" />
  
  <!-- Pelican leg (hanging) -->
  <path d="M 175 245 Q 165 270 160 295" stroke="#ff9933" stroke-width="4" fill="none" stroke-linecap="round" />
  <path d="M 155 295 L 165 305 L 170 300 L 163 298" fill="#ff9933" />
  
  <!-- Clouds -->
  <ellipse cx="80" cy="80" rx="30" ry="15" fill="#fff" />
  <ellipse cx="60" cy="75" rx="25" ry="12" fill="#fff" />
  <ellipse cx="100" cy="75" rx="25" ry="12" fill="#fff" />
  
  <ellipse cx="320" cy="60" rx="35" ry="17" fill="#fff" />
  <ellipse cx="300" cy="55" rx="30" ry="14" fill="#fff" />
  <ellipse cx="340" cy="55" rx="30" ry="14" fill="#fff" />
  
  <!-- Sun -->
  <circle cx="340" cy="340" r="25" fill="#ffd700" />
  <path d="M 340 305 L 340 295" stroke="#ffd700" stroke-width="3" stroke-linecap="round" />
  <path d="M 340 375 L 340 385" stroke="#ffd700" stroke-width="3" stroke-linecap="round" />
  <path d="M 305 340 L 295 340" stroke="#ffd700" stroke-width="3" stroke-linecap="round" />
  <path d="M 375 340 L 385 340" stroke="#ffd700" stroke-width="3" stroke-linecap="round" />
  <path d="M 315 315 L 308 308" stroke="#ffd700" stroke-width="3" stroke-linecap="round" />
  <path d="M 365 365 L 372 372" stroke="#ffd700" stroke-width="3" stroke-linecap="round" />
  <path d="M 365 315 L 372 308" stroke="#ffd700" stroke-width="3" stroke-linecap="round" />
  <path d="M 315 365 L 308 372" stroke="#ffd700" stroke-width="3" stroke-linecap="round" />
</svg>