<svg width="500" height="400" viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Ground -->
  <line x1="0" y1="350" x2="500" y2="350" stroke="#888" stroke-width="2" />

  <!-- Bicycle Back Wheel -->
  <g fill="none" stroke="#333" stroke-width="5">
    <circle cx="120" cy="300" r="45" />
    <circle cx="120" cy="300" r="35" stroke="#ddd" stroke-dasharray="5,5" />
    <path d="M120 255 L120 345 M75 300 L165 300 M85 265 L155 335 M85 335 L155 265" stroke="#999" stroke-width="2"/>
  </g>

  <!-- Bicycle Front Wheel -->
  <g fill="none" stroke="#333" stroke-width="5">
    <circle cx="380" cy="300" r="45" />
    <circle cx="380" cy="300" r="35" stroke="#ddd" stroke-dasharray="5,5" />
    <path d="M380 255 L380 345 M335 300 L425 300 M345 265 L415 335 M345 335 L415 265" stroke="#999" stroke-width="2"/>
  </g>

  <!-- Bicycle Frame -->
  <g fill="none" stroke="#E74C3C" stroke-width="8" stroke-linejoin="round" stroke-linecap="round">
    <!-- Back Triangle -->
    <path d="M120 300 L200 300 L170 200 Z" />
    <!-- Top Bar & Fork -->
    <path d="M170 200 L360 200" /> <!-- Top tube -->
    <path d="M360 200 L380 300" /> <!-- Front fork -->
    <!-- Handlebar Stem -->
    <path d="M360 200 L360 170" stroke="#555" stroke-width="6"/>
    <!-- Handlebars -->
    <path d="M345 170 L375 170" stroke="#333" stroke-width="4"/>
    <!-- Seat Post & Seat -->
    <line x1="170" y1="200" x2="170" y2="170" stroke="#555" stroke-width="4"/>
    <path d="M155 170 Q170 160 185 170" fill="#333" />
    <!-- Pedal Crank -->
    <circle cx="200" cy="300" r="10" stroke="#555" stroke-width="2" fill="#999"/>
  </g>

  <!-- Pelican Body -->
  <ellipse cx="190" cy="200" rx="50" ry="40" fill="#FFFFFF" stroke="#CCC" stroke-width="2"/>
  
  <!-- Pelican Wing -->
  <path d="M180 210 Q230 210 230 180 Q230 150 190 155 Z" fill="#F0F0F0" stroke="#CCC" stroke-width="1"/>

  <!-- Pelican Neck -->
  <path d="M210 180 Q250 180 250 140" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round"/>

  <!-- Pelican Head -->
  <circle cx="250" cy="140" r="25" fill="#FFFFFF" stroke="#CCC" stroke-width="2"/>
  <!-- Eye -->
  <circle cx="260" cy="135" r="3" fill="#000" />

  <!-- The Beak (The Pouch) -->
  <path d="M270 145 L340 145 Q360 145 360 160 Q320 190 270 155 Z" fill="#FFB74D" stroke="#E65100" stroke-width="2"/>
  <!-- Beak Tip -->
  <path d="M340 145 L350 145 L348 155 Z" fill="#FFF" />

  <!-- Wing holding Handlebar (Stylized) -->
  <path d="M190 180 Q300 180 330 170" fill="none" stroke="#F0F0F0" stroke-width="12" stroke-linecap="round"/>
  <circle cx="335" cy="172" r="8" fill="#F0F0F0" stroke="#CCC" stroke-width="1"/>

  <!-- Legs / Feet -->
  <path d="M180 230 L200 280" stroke="#FFB74D" stroke-width="6" stroke-linecap="round"/>
  <!-- Foot on Pedal -->
  <ellipse cx="205" cy="290" rx="15" ry="6" fill="#FF9800" transform="rotate(10 205 290)" />

</svg>