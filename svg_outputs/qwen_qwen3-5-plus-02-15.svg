<svg width="500" height="400" viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky Background -->
  <rect width="500" height="400" fill="#e0f7fa" />
  <rect y="350" width="500" height="50" fill="#8d6e63" /> <!-- Ground -->

  <!-- Bicycle Group -->
  <g transform="translate(0, -20)">
    
    <!-- Back Wheel -->
    <g transform="translate(100, 280)">
      <circle cx="0" cy="0" r="50" fill="none" stroke="#555" stroke-width="8" />
      <circle cx="0" cy="0" r="45" fill="none" stroke="#ccc" stroke-width="2" stroke-dasharray="5,5" />
      <circle cx="0" cy="0" r="5" fill="#555" />
    </g>

    <!-- Front Wheel -->
    <g transform="translate(380, 280)">
      <circle cx="0" cy="0" r="50" fill="none" stroke="#555" stroke-width="8" />
      <circle cx="0" cy="0" r="45" fill="none" stroke="#ccc" stroke-width="2" stroke-dasharray="5,5" />
      <circle cx="0" cy="0" r="5" fill="#555" />
    </g>

    <!-- Bike Frame -->
    <path d="M100 280 L200 180 L320 180 L380 280 M200 180 L200 280 L380 280" 
          fill="none" stroke="#b0bec5" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M320 180 L350 80" fill="none" stroke="#b0bec5" stroke-width="10" stroke-linecap="round"/> <!-- Seat post -->
    <path d="M200 180 L180 80 L160 100" fill="none" stroke="#555" stroke-width="8" stroke-linecap="round"/> <!-- Handlebars -->

    <!-- Seat -->
    <rect x="290" y="75" width="60" height="10" rx="5" fill="#333" />
    
    <!-- Pedals -->
    <circle cx="190" cy="230" r="15" fill="#999" />
  </g>

  <!-- Pelican Group -->
  <g transform="translate(0, -20)">
    <!-- Back Leg -->
    <path d="M260 200 L240 250 L260 280" fill="none" stroke="#f57c00" stroke-width="8" stroke-linecap="round" stroke-miterlimit="10"/>
    <path d="M240 280 L220 280 L260 290" fill="#f57c00" stroke="#f57c00" stroke-width="6" stroke-linecap="round"/> <!-- Webbed foot -->

    <!-- Body -->
    <ellipse cx="230" cy="160" rx="80" ry="50" fill="#fff" />
    
    <!-- Wing -->
    <path d="M200 160 Q 150 160 150 190 Q 200 210 240 180 Z" fill="#eceff1" stroke="#cfd8dc" stroke-width="2"/>

    <!-- Neck and Head -->
    <path d="M260 130 Q 280 100 290 60 L 340 120 Q 360 150 260 150 Z" fill="#fff" />
    
    <!-- Beak Top -->
    <path d="M290 60 Q 320 40 420 50 L 290 90" fill="#ffc107" />
    <path d="M290 90 L 410 90 Q 420 100 380 110 Q 320 120 290 110" fill="#ffb300" /> <!-- Pouch -->
    
    <!-- Eye -->
    <circle cx="295" cy="70" r="4" fill="#000" />
    <circle cx="297" cy="68" r="1.5" fill="#fff" />

    <!-- Front Leg -->
    <path d="M220 190 L240 230 L270 230" fill="none" stroke="#f57c00" stroke-width="8" stroke-linecap="round" stroke-miterlimit="10"/>
     <path d="M270 230 L290 230 L265 240" fill="#f57c00" stroke="#f57c00" stroke-width="6" stroke-linecap="round"/> <!-- Webbed foot on pedal -->

  </g>
</svg>