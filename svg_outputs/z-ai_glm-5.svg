<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Sky Background -->
  <rect width="400" height="300" fill="#87CEEB"/>
  
  <!-- Sun -->
  <circle cx="350" cy="50" r="30" fill="#FFD700" opacity="0.8"/>
  
  <!-- Ground -->
  <rect y="250" width="400" height="50" fill="#88B04B"/>
  
  <!-- Bicycle Frame -->
  <g stroke="#2C3E50" stroke-width="4" fill="none">
    <!-- Wheels -->
    <circle cx="120" cy="230" r="30" fill="none" stroke-width="3"/>
    <circle cx="280" cy="230" r="30" fill="none" stroke-width="3"/>
    <!-- Spokes -->
    <line x1="120" y1="200" x2="120" y2="260"/>
    <line x1="90" y1="230" x2="150" y2="230"/>
    <line x1="280" y1="200" x2="280" y2="260"/>
    <line x1="250" y1="230" x2="310" y2="230"/>
    
    <!-- Frame Triangle -->
    <path d="M120 230 L180 170 L230 230 Z"/>
    <line x1="180" y1="170" x2="280" y2="230"/>
    
    <!-- Handlebar Stem & Bars -->
    <path d="M230 230 L250 160"/>
    <path d="M235 160 L265 160"/>
    
    <!-- Seat Post -->
    <line x1="150" y1="200" x2="150" y2="160"/>
  </g>
  
  <!-- Seat -->
  <ellipse cx="150" cy="158" rx="15" ry="5" fill="#34495E"/>
  
  <!-- Pedals -->
  <rect x="165" y="225" width="10" height="5" fill="#2C3E50"/>
  <rect x="185" y="235" width="10" height="5" fill="#2C3E50"/>
  <circle cx="180" cy="230" r="5" fill="#2C3E50"/>

  <!-- Pelican Body -->
  <ellipse cx="160" cy="120" rx="50" ry="35" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  
  <!-- Pelican Wing -->
  <path d="M140 100 Q180 90 190 130 Q160 140 130 120 Z" fill="#EEEEEE" stroke="#BDBDBD" stroke-width="1"/>
  
  <!-- Pelican Neck -->
  <path d="M190 110 Q220 90 210 50" fill="none" stroke="#F5F5F5" stroke-width="20"/>
  <path d="M190 110 Q220 90 210 50" fill="none" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="0,100,20,100"/>
  
  <!-- Pelican Head -->
  <ellipse cx="210" cy="45" rx="20" ry="18" fill="#F5F5F5"/>
  
  <!-- Pelican Beak (Upper) -->
  <path d="M225 45 L280 50 L225 55 Z" fill="#F4A460"/>
  
  <!-- Pelican Pouch -->
  <path d="M225 55 Q260 80 225 65" fill="#FFDAB9" stroke="#F4A460" stroke-width="1"/>
  
  <!-- Pelican Eye -->
  <circle cx="215" cy="40" r="3" fill="#000"/>
  <circle cx="214" cy="39" r="1" fill="#FFF"/>
  
  <!-- Pelican Legs -->
  <g stroke="#F4A460" stroke-width="3" fill="none">
    <!-- Leg 1 -->
    <path d="M140 150 L165 225"/>
    <!-- Leg 2 -->
    <path d="M160 150 L185 235"/>
  </g>
  
  <!-- Feet (on pedals) -->
  <path d="M163 223 L175 228 L163 230 Z" fill="#F4A460" />
  <path d="M183 233 L195 238 L183 240 Z" fill="#F4A460" />
  
  <!-- Helmet -->
  <ellipse cx="210" cy="30" rx="22" ry="12" fill="#E74C3C"/>
  <path d="M188 30 Q210 20 232 30" fill="none" stroke="#C0392B" stroke-width="2"/>
</svg>