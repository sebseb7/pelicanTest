<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250" width="300" height="250">
  <!-- Background -->
  <rect width="300" height="250" fill="#87CEEB" />
  
  <!-- Sun -->
  <circle cx="250" cy="40" r="25" fill="#FFD700" />

  <!-- Bicycle Frame -->
  <g id="bicycle">
    <!-- Wheels -->
    <circle cx="80" cy="190" r="40" fill="none" stroke="#333" stroke-width="4" />
    <circle cx="220" cy="190" r="40" fill="none" stroke="#333" stroke-width="4" />
    
    <!-- Spokes (Simplified) -->
    <circle cx="80" cy="190" r="3" fill="#333" />
    <circle cx="220" cy="190" r="3" fill="#333" />

    <!-- Frame -->
    <path d="M80 190 L130 150 L180 190 Z" fill="none" stroke="#E74C3C" stroke-width="5" stroke-linejoin="round" />
    <path d="M130 150 L150 190 L220 190" fill="none" stroke="#E74C3C" stroke-width="5" stroke-linejoin="round" />
    
    <!-- Handlebar Stem -->
    <path d="M180 190 L190 140" fill="none" stroke="#E74C3C" stroke-width="5" />
    
    <!-- Handlebars -->
    <path d="M175 135 L205 135" fill="none" stroke="#333" stroke-width="5" stroke-linecap="round" />
    
    <!-- Seat Post -->
    <path d="M130 150 L120 120" fill="none" stroke="#E74C3C" stroke-width="5" />
    
    <!-- Seat -->
    <ellipse cx="120" cy="118" rx="15" ry="5" fill="#333" />
    
    <!-- Pedals -->
    <circle cx="150" cy="190" r="4" fill="#333" />
    <line x1="150" y1="190" x2="140" y2="200" stroke="#333" stroke-width="3" />
    <line x1="150" y1="190" x2="160" y2="180" stroke="#333" stroke-width="3" />
  </g>

  <!-- Pelican -->
  <g id="pelican">
    <!-- Tail Feathers -->
    <path d="M70 120 Q50 130 60 140" fill="#F5F5F5" stroke="#333" stroke-width="1" />
    
    <!-- Body -->
    <ellipse cx="110" cy="120" rx="40" ry="30" fill="#F5F5F5" stroke="#333" stroke-width="2" />
    
    <!-- Wing -->
    <path d="M90 110 Q80 130 100 140 Q130 150 140 130 Q130 110 110 105" fill="#E0E0E0" stroke="#333" stroke-width="1" />
    
    <!-- Neck -->
    <path d="M140 110 Q160 90 150 60" fill="#F5F5F5" stroke="#333" stroke-width="2" />
    
    <!-- Head -->
    <circle cx="150" cy="55" r="15" fill="#F5F5F5" stroke="#333" stroke-width="2" />
    
    <!-- Eye -->
    <circle cx="155" cy="50" r="3" fill="#000" />
    <circle cx="156" cy="49" r="1" fill="#FFF" />
    
    <!-- Beak Top -->
    <path d="M165 55 L220 60 L165 65 Z" fill="#F39C12" stroke="#333" stroke-width="1" />
    
    <!-- Beak Pouch -->
    <path d="M165 65 Q195 85 220 60" fill="#F5B041" stroke="#333" stroke-width="1" opacity="0.9" />
    
    <!-- Legs -->
    <path d="M100 145 L95 185" stroke="#F39C12" stroke-width="3" stroke-linecap="round" />
    <path d="M115 145 L120 185" stroke="#F39C12" stroke-width="3" stroke-linecap="round" />
    
    <!-- Feet on Pedals -->
    <path d="M92 185 L85 192 L100 190 Z" fill="#F39C12" stroke="#333" stroke-width="1" />
    <path d="M118 185 L125 192 L110 190 Z" fill="#F39C12" stroke="#333" stroke-width="1" />
    
    <!-- Wings holding handlebar (Left) -->
    <path d="M150 115 Q175 120 190 135" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" />
  </g>
</svg>